<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>{{ 'Edit Lokasi' if lokasi else 'Tambah Lokasi' }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar-glass text-white p-3" style="width: 220px; min-height: 100vh;">
      <h4 class="mb-4">ADMIN PANEL</h4>
      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a href="{{ url_for('admin.dashboard') }}" class="nav-link text-white">Dashboard</a>
        </li>
        <li class="nav-item mb-2">
          <a href="{{ url_for('admin.list_satwa') }}" class="nav-link text-white">Data Satwa</a>
        </li>
        <li class="nav-item mb-2">
          <a href="{{ url_for('admin.list_lokasi') }}" class="nav-link text-white">Data Lokasi</a>
        </li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4 main-content">
      <div class="card shadow">
        <div class="card-body">

          <h3 class="card-title mb-4">
            {{ 'Edit Lokasi' if lokasi else 'Tambah Lokasi' }}
          </h3>

          <!-- FORM UTAMA -->
          <form method="POST" enctype="multipart/form-data">

            <!-- Gambar lokasi -->
            <div class="mb-3">
              <label class="form-label">Gambar Lokasi Saat Ini</label>

              {% if lokasi and lokasi.gambar %}
              <div class="mb-2">
                <img src="{{ url_for('static', filename='img/lokasi/' ~ lokasi.gambar) }}"
                  alt="{{ lokasi.nama_lokasi }}" class="img-fluid rounded shadow-sm mb-2" style="max-height:150px;">
              </div>

              <!-- tombol hapus gambar -->
              <a href="{{ url_for('admin.hapus_gambar_lokasi', lokasi_id=lokasi.id) }}" class="btn btn-sm btn-danger"
                onclick="return confirm('Yakin hapus gambar ini?')">
                Hapus Gambar
              </a>

              {% else %}
              <span class="text-muted">Belum ada gambar</span>
              {% endif %}
            </div>

            <!-- Upload gambar baru -->
            <div class="mb-3">
              <label class="form-label">Upload Gambar Baru</label>
              <input type="file" class="form-control" name="gambar_file">
            </div>

            <!-- Nama lokasi -->
            <div class="mb-3">
              <label class="form-label">Nama Lokasi</label>
              <input type="text" class="form-control" name="nama_lokasi"
                value="{{ lokasi.nama_lokasi if lokasi else '' }}" required>
            </div>

            <!-- Kategori -->
            <div class="mb-3">
              <label for="kategori" class="form-label">Kategori Lokasi</label>
              <select class="form-select" id="kategori" name="kategori" required>
                <option value="Cagar Alam" {% if lokasi and lokasi.kategori=="Cagar Alam" %}selected{% endif %}>CAGAR
                  ALAM</option>
                <option value="Suaka Margasatwa" {% if lokasi and lokasi.kategori=="Suaka Margasatwa" %}selected{% endif
                  %}>Suaka Margasatwa</option>
                <option value="Taman Wisata Alam" {% if lokasi and lokasi.kategori=="Taman Wisata Alam" %}selected{%
                  endif %}>Taman Wisata Alam</option>
              </select>
            </div>


            <!-- Deskripsi -->
            <div class="mb-3">
              <label class="form-label">Deskripsi</label>
              <textarea id="deskripsi" class="form-control" name="deskripsi"
                rows="8">{{ satwa.deskripsi if satwa else '' }}</textarea>
            </div>


            <!-- Koordinat -->
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Latitude</label>
                <input type="text" class="form-control" name="latitude" value="{{ lokasi.latitude if lokasi else '' }}"
                  required>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Longitude</label>
                <input type="text" class="form-control" name="longitude"
                  value="{{ lokasi.longitude if lokasi else '' }}" required>
              </div>
            </div>

            <!-- Tombol -->
            <button type="submit" class="btn btn-primary">Simpan</button>
            <a href="{{ url_for('admin.list_lokasi') }}" class="btn btn-secondary">Batal</a>

          </form>

        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>

  <script>
    ClassicEditor.create(document.querySelector('#deskripsi'), {
      toolbar: [
        'heading',
        '|',
        'bold', 'italic', 'underline',
        '|',
        'bulletedList', 'numberedList',
        '|',
        'link', 'blockQuote',
        '|',
        'undo', 'redo'
      ]
    });
  </script>

</body>

</html>
