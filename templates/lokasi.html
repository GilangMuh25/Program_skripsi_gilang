<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lokasi Persebaran Satwa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

  <!-- NAVBAR + SEARCH -->
  <div class="top-bar text-center py-2"
       style="position:sticky; top:0; width:100%; z-index:1000;
              background-color: rgba(240, 240, 240, 0);
              backdrop-filter: blur(6px);
              box-shadow:none;">

    <!-- Navbar links -->
    <div class="mb-2">
      <a href="/" class="mx-3 text-decoration-none text-black fw-bold">Beranda</a>
      <a href="/satwa" class="mx-3 text-decoration-none text-black fw-bold">List Satwa</a>
      <a href="/peta" class="mx-3 text-decoration-none text-black fw-bold">Peta</a>
      <a href="/lokasi" class="mx-3 text-decoration-none text-black fw-bold">Lokasi</a>
      <a href="/about" class="mx-3 text-decoration-none text-black fw-bold">About</a>
    </div>

    <!-- Search bar -->
    <div class="px-3" style="max-width:400px; margin:0 auto;">
      <input type="text" id="searchLokasi" class="form-control" placeholder="Cari lokasi...">
    </div>

  </div>

  <!-- CONTENT -->
  <section class="container my-4 {% if lokasi_list|length <= 3 %}sedikit{% endif %}">

    {% if kategori %}
      <h2 class="text-center mb-4">
        {{ kategori }}
      </h2>
    {% else %}
      <h2 class="text-center mb-4">
        Semua Lokasi
      </h2>
    {% endif %}

    <div class="row">

      {% for lokasi in lokasi_list %}

      <div class="col-md-4 mb-4 reveal-lokasi">

        <a href="/lokasi/{{ lokasi.id }}" class="text-decoration-none">

          <div class="lokasi-card">

            <img
              loading="lazy"
              src="{{ url_for('static', filename='img/lokasi/' ~ (lokasi.gambar if lokasi.gambar else 'default.png')) }}"
              alt="{{ lokasi.nama_lokasi }}">

            <div class="lokasi-overlay">

              <h5>{{ lokasi.nama_lokasi }}</h5>

              <div class="lokasi-deskripsi-singkat">
                {{ lokasi.deskripsi | safe or 'Kawasan konservasi satwa dilindungi.' }}
              </div>

            </div>

          </div>

        </a>

      </div>

      {% endfor %}

    </div>

  </section>

  <!-- SEARCH SCRIPT -->
  <script>

    const input = document.getElementById("searchLokasi");

    input.addEventListener("keyup", function () {

      const keyword = this.value.toLowerCase();

      const cards = document.querySelectorAll(".col-md-4");

      cards.forEach(card => {

        const nama = card.innerText.toLowerCase();

        if (nama.includes(keyword)) {

          card.style.display = "block";

        } else {

          card.style.display = "none";

        }

      });

    });

  </script>

  <!-- REVEAL ANIMATION -->
  <script>

    function revealLokasiOnScroll() {

      const reveals = document.querySelectorAll('.reveal-lokasi');

      reveals.forEach((element) => {

        const windowHeight = window.innerHeight;

        const revealTop = element.getBoundingClientRect().top;

        const revealPoint = 100;

        if (revealTop < windowHeight - revealPoint) {

          element.classList.add('active');

        }

      });

    }

    window.addEventListener('scroll', revealLokasiOnScroll);

    revealLokasiOnScroll();

  </script>

</body>

</html>
