<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>List Satwa</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR + SEARCH -->
<div class="top-bar text-center py-2"
     style="position:fixed; top:0; width:100%; z-index:1000;
            background-color: rgba(240, 240, 240, 0); backdrop-filter: blur(6px);
            box-shadow:none;">

  <!-- Navbar links -->
  <div class="mb-2">
    <a href="/" class="mx-3 text-decoration-none text-black fw-bold">Beranda</a>
    <a href="/peta" class="mx-3 text-decoration-none text-black fw-bold">Peta</a>
    <a href="/lokasi" class="mx-3 text-decoration-none text-black fw-bold">Lokasi</a>
    <a href="/about" class="mx-3 text-decoration-none text-black fw-bold">About</a>
  </div>

  <!-- Search bar -->
  <div class="px-3" style="max-width:400px; margin:0 auto;">
    <input type="text" id="searchInput" class="form-control" placeholder="Cari satwa...">
  </div>
</div>

<!-- CONTENT -->
<section class="container"
         style="margin-top:100px;">

  <h2 class="text-center mb-4">
    Daftar Satwa Dilindungi
  </h2>

</section>

<!-- Grid Card Satwa -->
<div class="container">

  <div class="row" id="satwaContainer">

    {% for satwa in satwa_list %}

    <div class="col-md-3 mb-4 satwa-item reveal-satwa">

      <div class="card satwa-card shadow-sm h-100 text-center">

        <a href="/satwa/{{ satwa.id }}">

          <img
            loading="lazy"
            src="{{ url_for('static', filename='img/satwa/' ~ (satwa.gambar_relasi[0].filename if satwa.gambar_relasi else 'default.png')) }}"
            alt="{{ satwa.nama_satwa }}">

        </a>

        <div class="card-body">

          <h6 class="card-title">

            {{ satwa.nama_satwa }}

            <small class="text-muted fst-italic d-block">

              {{ satwa.nama_latin }}

            </small>

          </h6>

          <p class="card-text text-muted">

            {{ satwa.jenis_satwa }}<br>
            {{ satwa.status_satwa }}

          </p>

        </div>

      </div>

    </div>

    {% endfor %}

  </div>

</div>

<!-- Script Search -->
<script>

document.addEventListener("DOMContentLoaded", function () {

    const searchInput = document.getElementById("searchInput");

    const items = document.querySelectorAll("#satwaContainer .satwa-item");

    searchInput.addEventListener("keyup", function () {

        let filter = this.value.toLowerCase();

        items.forEach(function (item) {

            let text = item.innerText.toLowerCase();

            item.style.display = text.includes(filter) ? "" : "none";

        });

    });

});

</script>

<!-- REVEAL ANIMATION -->
<script>

function revealSatwaOnScroll() {

    const reveals = document.querySelectorAll('.reveal-satwa');

    reveals.forEach((element) => {

        const windowHeight = window.innerHeight;

        const revealTop = element.getBoundingClientRect().top;

        const revealPoint = 100;

        if (revealTop < windowHeight - revealPoint) {

            element.classList.add('active');

        }

    });

}

window.addEventListener('scroll', revealSatwaOnScroll);

revealSatwaOnScroll();

</script>

</body>

</html>
